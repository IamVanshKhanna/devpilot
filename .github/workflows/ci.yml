name: DevPilot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devpilot
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: devpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://devpilot:testpass@localhost:5432/devpilot_test
          REDIS_URL: redis://localhost:6379
          GITHUB_APP_ID: test
          GITHUB_PRIVATE_KEY: test
          GITHUB_WEBHOOK_SECRET: test
          OPENROUTER_API_KEY: test
          STRIPE_SECRET_KEY: test
          STRIPE_WEBHOOK_SECRET: test
          RESEND_API_KEY: test

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Lint
        run: |
          cd frontend
          npm run lint --if-present || echo "No lint configured"

      - name: Build
        run: |
          cd frontend
          npm run build --if-present || echo "No build step"

  docker:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Build backend image (smoke test)
        run: docker compose build backend